<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2452b8">
    <title>Kapcsolat</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="assets/images/budget-icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <a class="skip-link" href="#main-content" id="skip-link">Ugrás a tartalomra</a>
    <main id="main-content" class="app-shell contact-page" tabindex="-1">
        <header class="hero contact-frame">
            <div class="hero-toolbar">
                <div class="hero-toolbar-group">
                    <div class="language-corner">
                        <label for="app-language" class="sr-only" id="language-label">Nyelv</label>
                        <select id="app-language" aria-label="Nyelv választó">
                            <option value="hu">HU</option>
                            <option value="en">EN</option>
                        </select>
                    </div>
                </div>
                <p class="version-badge"><span id="version-label">Verzió</span> <span id="app-version">1.0.0</span></p>
                <div class="theme-switch-inline" role="group" aria-label="Téma váltó">
                    <button id="theme-light-button" type="button" class="theme-switch-btn">
                        <span class="theme-switch-btn-icon" aria-hidden="true">☀</span>
                        <span class="theme-switch-btn-label" id="theme-light-label">Világos</span>
                    </button>
                    <button id="theme-dark-button" type="button" class="theme-switch-btn">
                        <span class="theme-switch-btn-icon" aria-hidden="true">☾</span>
                        <span class="theme-switch-btn-label" id="theme-dark-label">Sötét</span>
                    </button>
                </div>
            </div>
            <h1 id="contact-title">Kapcsolat</h1>
            <p id="contact-subtitle">Ha kérdésed, visszajelzésed vagy ötleted van, küldj üzenetet.</p>
            <div class="contact-quick-actions">
                <a class="btn contact-btn-primary" href="index.html" id="back-home-link">Vissza a Kezdőlapra</a>
                <a class="btn contact-btn-accent" href="budget.html" id="open-budget-link">Költségvetés megnyitása</a>
            </div>
        </header>

        <section class="card contact-card contact-frame">
            <h2 id="form-title">Üzenet küldése</h2>
            <form class="stack" id="contact-form">
                <label for="contact-name" id="label-name">Teljes név (kötelező)</label>
                <input type="text" id="contact-name" name="name" required maxlength="100">

                <label for="contact-username" id="label-username">Felhasználónév (opcionális)</label>
                <input type="text" id="contact-username" name="username" maxlength="60">

                <label for="contact-email" id="label-email">Email cím (kötelező)</label>
                <input type="email" id="contact-email" name="email" required maxlength="160">

                <label for="contact-message" id="label-message">Üzenet</label>
                <textarea id="contact-message" name="message" rows="6" maxlength="1200" required id="contact-message-field"></textarea>

                <p id="contact-feedback" class="auth-message" aria-live="polite"></p>

                <div class="h-captcha" data-captcha="true"></div>

                <button type="submit" class="contact-btn-primary" id="submit-button">Üzenet küldése</button>
            </form>
        </section>
    </main>

    <footer class="footer-content">
        <p>@ 2026 Amethyst Nexalune.</p>
        <p id="footer-text">Minden jog fenntartva.</p>
    </footer>

    <script src="assets/js/app-shared.js"></script>
    <script type="module">
        import { app } from "./assets/js/firebase-init.js";
        import {
            getFirestore,
            collection,
            addDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const WEB3FORMS_KEY = "b4c66ee3-69e7-4c59-a8c9-77d96ad55ca9";
        const db = getFirestore(app);
        const form = document.getElementById("contact-form");
        const feedback = document.getElementById("contact-feedback");

        const shared = window.BudgetAppShared;

        const dictionary = {
            hu: {
                pageTitle: "Kapcsolat",
                skipLink: "Ugrás a tartalomra",
                languageLabel: "Nyelv",
                languageAria: "Nyelv választó",
                versionLabel: "Verzió",
                themeAria: "Téma váltó",
                themeModeLight: "Világos",
                themeModeDark: "Sötét",
                title: "Kapcsolat",
                subtitle: "Ha kérdésed, visszajelzésed vagy ötleted van, küldj üzenetet.",
                backHome: "Vissza a Kezdőlapra",
                openBudget: "Költségvetés megnyitása",
                formTitle: "Üzenet küldése",
                labelName: "Teljes név (kötelező)",
                labelUsername: "Felhasználónév (opcionális)",
                labelEmail: "Email cím (kötelező)",
                labelMessage: "Üzenet",
                submitButton: "Üzenet küldése",
                sending: "Küldés...",
                success: "Az üzenet sikeresen elküldve!",
                error: "Nem sikerült elküldeni. Próbáld újra.",
                footer: "Minden jog fenntartva."
            },
            en: {
                pageTitle: "Contact Us",
                skipLink: "Skip to content",
                languageLabel: "Language",
                languageAria: "Language selector",
                versionLabel: "Version",
                themeAria: "Theme switcher",
                themeModeLight: "Light",
                themeModeDark: "Dark",
                title: "Contact Us",
                subtitle: "If you have any questions, feedback, or ideas, feel free to send a message.",
                backHome: "Back to Home",
                openBudget: "Open Budget",
                formTitle: "Message form",
                labelName: "Full Name (required)",
                labelUsername: "Username (optional)",
                labelEmail: "Email address (required)",
                labelMessage: "Message",
                submitButton: "Send message",
                sending: "Sending...",
                success: "Message sent successfully!",
                error: "Failed to send. Please try again.",
                footer: "All rights reserved."
            }
        };

        let appLanguage = shared.loadLanguage();
        let appTheme = shared.loadTheme();

        const languageSelect = document.getElementById("app-language");
        const themeLightButton = document.getElementById("theme-light-button");
        const themeDarkButton = document.getElementById("theme-dark-button");

        function t(key) {
            return (dictionary[appLanguage] || dictionary.hu)[key] || key;
        }

        function applyTranslations() {
            document.documentElement.lang = appLanguage;
            document.title = t("pageTitle");
            document.getElementById("skip-link").textContent = t("skipLink");
            document.getElementById("language-label").textContent = t("languageLabel");
            document.getElementById("app-language").setAttribute("aria-label", t("languageAria"));
            document.getElementById("version-label").textContent = t("versionLabel");
            document.getElementById("theme-light-label").textContent = t("themeModeLight");
            document.getElementById("theme-dark-label").textContent = t("themeModeDark");
            document.getElementById("contact-title").textContent = t("title");
            document.getElementById("contact-subtitle").textContent = t("subtitle");
            document.getElementById("back-home-link").textContent = t("backHome");
            document.getElementById("open-budget-link").textContent = t("openBudget");
            document.getElementById("form-title").textContent = t("formTitle");
            document.getElementById("label-name").textContent = t("labelName");
            document.getElementById("label-username").textContent = t("labelUsername");
            document.getElementById("label-email").textContent = t("labelEmail");
            document.getElementById("label-message").textContent = t("labelMessage");
            document.getElementById("submit-button").textContent = t("submitButton");
            document.getElementById("footer-text").textContent = t("footer");
            languageSelect.value = appLanguage;
        }

        function applyTheme() {
            document.documentElement.setAttribute("data-theme", appTheme);
        }

        function syncThemeButtons() {
            const isLight = appTheme === "light";
            themeLightButton.classList.toggle("is-active", isLight);
            themeLightButton.setAttribute("aria-pressed", String(isLight));
            themeDarkButton.classList.toggle("is-active", !isLight);
            themeDarkButton.setAttribute("aria-pressed", String(!isLight));
        }

        function setTheme(mode) {
            appTheme = mode === "dark" ? "dark" : "light";
            shared.saveTheme(appTheme);
            applyTheme();
            syncThemeButtons();
        }

        languageSelect.addEventListener("change", function () {
            appLanguage = this.value;
            shared.saveLanguage(appLanguage);
            applyTranslations();
        });

        themeLightButton.addEventListener("click", function () { setTheme("light"); });
        themeDarkButton.addEventListener("click", function () { setTheme("dark"); });

        applyTheme();
        syncThemeButtons();
        applyTranslations();

        form.addEventListener("submit", async function (e) {
            e.preventDefault();
            const btn = form.querySelector("button[type=submit]");
            const originalText = btn.textContent;
            btn.disabled = true;
            btn.textContent = t("sending");
            feedback.textContent = "";
            feedback.className = "auth-message";

            const name    = document.getElementById("contact-name").value.trim();
            const username = document.getElementById("contact-username").value.trim() || "";
            const email   = document.getElementById("contact-email").value.trim();
            const message = document.getElementById("contact-message").value.trim();

            try {
                const formData = new FormData();
                formData.append("access_key", WEB3FORMS_KEY);
                formData.append("name", name);
                formData.append("email", email);
                formData.append("message", username ? `[${username}]\n\n${message}` : message);

                const res = await fetch("https://api.web3forms.com/submit", {
                    method: "POST",
                    body: formData
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.message || "Web3Forms error");

                await addDoc(collection(db, "contacts"), {
                    name, username, email, message,
                    sentAt: serverTimestamp(),
                    status: "new"
                }).catch(() => {});

                feedback.textContent = t("success");
                feedback.className = "auth-message ok";
                form.reset();
            } catch (err) {
                console.error("Contact form error:", err);
                feedback.textContent = t("error");
                feedback.className = "auth-message error";
            } finally {
                btn.disabled = false;
                btn.textContent = t("submitButton");
            }
        });
    </script>
    <script src="https://web3forms.com/client/script.js" async defer></script>
</body>
</html>
