<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#2452b8">
    <title>Contact Us</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="assets/images/budget-icon.png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <a class="skip-link" href="#main-content">Ugrás a tartalomra</a>

    <main id="main-content" class="app-shell contact-page" tabindex="-1">
        <header class="hero contact-frame">
            <h1>Contact Us</h1>
            <p>If you have any questions, feedback, or ideas, feel free to send a message.</p>
            <div class="contact-quick-actions">
                <a class="btn contact-btn-primary" href="index.html">Back to Home</a>
                <a class="btn contact-btn-accent" href="budget.html">Open Budget</a>
            </div>
        </header>

        <section class="card contact-card contact-frame">
            <h2>Message form</h2>
            <form class="stack" id="contact-form">
                <label for="contact-name">Full Name (required)</label>
                <input type="text" id="contact-name" name="name" required maxlength="100">

                <label for="contact-username">Username (optional)</label>
                <input type="text" id="contact-username" name="username" maxlength="60">

                <label for="contact-email">Email address (required)</label>
                <input type="email" id="contact-email" name="email" required maxlength="160">

                <label for="contact-message">Message</label>
                <textarea id="contact-message" name="message" rows="6" maxlength="1200" required placeholder="Write your message here..."></textarea>

                <p id="contact-feedback" class="auth-message" aria-live="polite"></p>

                <button type="submit" class="contact-btn-primary">Send message</button>
            </form>
        </section>
    </main>

    <footer class="footer-content">
        <p>@ 2026 Amethyst Nexalune.</p>
    </footer>

    <script type="module">
        import { app } from "./assets/js/firebase-init.js";
        import {
            getFirestore,
            collection,
            addDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";

        const db = getFirestore(app);
        const form = document.getElementById("contact-form");
        const feedback = document.getElementById("contact-feedback");

        form.addEventListener("submit", async function (e) {
            e.preventDefault();
            const btn = form.querySelector("button[type=submit]");
            btn.disabled = true;
            feedback.textContent = "";
            feedback.className = "auth-message";

            try {
                await addDoc(collection(db, "contacts"), {
                    name: document.getElementById("contact-name").value.trim(),
                    username: document.getElementById("contact-username").value.trim() || "",
                    email: document.getElementById("contact-email").value.trim(),
                    message: document.getElementById("contact-message").value.trim(),
                    sentAt: serverTimestamp(),
                    status: "new"
                });
                feedback.textContent = "Message sent successfully!";
                feedback.className = "auth-message ok";
                form.reset();
            } catch (err) {
                console.error("Contact form error:", err);
                feedback.textContent = "Failed to send. Please try again.";
                feedback.className = "auth-message error";
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
