<!DOCTYPE html>
<html lang="hu">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="theme-color" content="#2452b8">
	<title>Adósságkezelő</title>
	<link rel="manifest" href="manifest.webmanifest">
	<link rel="icon" type="image/png" href="assets/images/budget-icon.png">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css" integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">
	<link rel="stylesheet" href="assets/css/style.css?v=9">
</head>
<body>
	<a class="skip-link" href="#main-content">Ugrás a tartalomra</a>
	<main id="main-content" class="app-shell" tabindex="-1">
		<header class="hero">
			<div class="hero-toolbar">
				<div class="language-corner">
					<label for="app-language" class="sr-only" data-i18n="languageLabel">Nyelv</label>
					<select id="app-language" data-i18n-aria-label="languageSelectorAria" aria-label="Nyelv választó">
						<option value="hu">HU</option>
						<option value="en">EN</option>
					</select>
				</div>
				<p class="version-badge"><span data-i18n="versionLabel">Verzió</span> <span id="app-version">1.0.0</span></p>
				<nav class="menu-wrap hero-menu-wrap">
					<div class="theme-switch-inline" role="group" data-i18n-aria-label="themeSwitchAria" aria-label="Téma váltó">
						<button id="theme-light-button" type="button" class="theme-switch-btn">
							<span class="theme-switch-btn-icon" aria-hidden="true">☀</span>
							<span class="theme-switch-btn-label" data-i18n="themeModeLight">Világos</span>
						</button>
						<button id="theme-dark-button" type="button" class="theme-switch-btn">
							<span class="theme-switch-btn-icon" aria-hidden="true">☾</span>
							<span class="theme-switch-btn-label" data-i18n="themeModeDark">Sötét</span>
						</button>
					</div>
					<button type="button" id="contact-us-button" data-i18n="contactUs">Kapcsolat</button>
					<button id="menu-toggle" type="button" class="menu-toggle" aria-expanded="false" aria-controls="menu-panel">
						<span class="sr-only" data-i18n="menuButton">Menü</span>
						<span class="hamburger-line"></span>
						<span class="hamburger-line"></span>
						<span class="hamburger-line"></span>
					</button>
					<div id="menu-panel" class="menu-panel">
						<p id="menu-session-info" class="menu-session-info" aria-live="polite"></p>
						<a href="index.html" data-i18n="homeLink">Kezdőlap</a>
						<button type="button" id="menu-profile-toggle" data-i18n="profileEditButton">Adatok módosítása</button>
						<div id="menu-profile-options" class="menu-profile-options hidden">
							<button type="button" id="menu-change-username" class="btn btn-info" data-i18n="changeUsernameMenuButton">Felhasználónév módosítása</button>
							<button type="button" id="menu-change-password" class="btn btn-info" data-i18n="changePasswordMenuButton">Jelszó módosítása</button>
						</div>
						<a href="budget.html" data-i18n="budgetLink">Költségvetés</a>
						<a href="budget-forecast.html" data-i18n="forecastButton">Előrejelző</a>
						<a href="summary.html" data-i18n="summaryLink">Összesítés</a>
						<a href="managing-debt.html" data-i18n="managingDebtLink">Adósságkezelő</a>
						<button id="menu-back-button" type="button" data-i18n="backAction">Vissza</button>
						<button id="install-app-button" type="button" data-i18n="downloadAppButton">App letöltése</button>
						<button id="menu-logout-button" type="button" class="menu-logout" data-i18n="logoutButton">Kijelentkezés</button>
						<hr class="menu-divider">
						<button type="button" class="btn btn-danger w-100 menu-danger-action" id="delete-account-button" data-i18n="deleteAccountButton">Regisztráció törlése</button>
					</div>
				</nav>
			</div>
			<h1 data-i18n="heroTitle">Adósságkezelő</h1>
			<p data-i18n="heroText">Kezeld hatékonyan az adósságaidat és tervezd meg a visszafizetést.</p>
		</header>

		<div class="card controls compact-controls budget-controls debt-controls">
			<div class="currency-control">
				<label for="app-currency" data-i18n="currencyLabel">Pénznem választó</label>
				<select id="app-currency" data-i18n-aria-label="currencySelectorAria" aria-label="Pénznem választó">
					<option value="HUF" data-i18n="currencyHuf">HUF (forint)</option>
					<option value="GBP" data-i18n="currencyGbp">GBP (font)</option>
					<option value="USD" data-i18n="currencyUsd">USD (dollár)</option>
					<option value="EUR" data-i18n="currencyEur">EUR (euró)</option>
				</select>
			</div>
			<div class="control-action">
				<div class="stack">
					<button id="summary-toggle-button" type="button" class="btn btn-primary" data-i18n="summaryLink">Összesítés</button>
					<button id="forecast-toggle-button" type="button" class="btn btn-success" data-i18n="forecastButton">Előrejelző</button>
					<button id="budget-toggle-button" type="button" class="btn btn-primary" data-i18n="budgetLink">Költségvetés</button>
				</div>
			</div>
		</div>

		<div id="debt-content" class="debt-layout">

			<article class="card">
				<h2 id="debt-form-title" data-i18n="debtFormTitle">Adósság hozzáadása</h2>
				<form id="debt-form" class="stack">
					<input type="hidden" id="debt-edit-id">

					<label for="debt-name" data-i18n="debtNameLabel">Hitel neve</label>
					<input type="text" id="debt-name" maxlength="100" required
					       data-i18n-placeholder="debtNamePlaceholder" placeholder="pl. Autóhitel...">

					<label for="debt-monthly-payment" data-i18n="debtMonthlyPaymentLabel">Havi törlesztő</label>
					<input type="number" id="debt-monthly-payment" min="0" step="0.01" inputmode="decimal" required>

					<label for="debt-payment-date" data-i18n="debtPaymentDateLabel">Törlesztés dátuma</label>
					<input type="date" id="debt-payment-date" required>

					<label for="debt-remaining-amount" data-i18n="debtRemainingAmountLabel">Fennmaradó összeg</label>
					<input type="number" id="debt-remaining-amount" min="0" step="0.01" inputmode="decimal" required>

					<label for="debt-due-date" data-i18n="debtDueDateLabel">Kifutás dátuma</label>
					<input type="date" id="debt-due-date">

					<label for="debt-early-payment-date" data-i18n="debtEarlyPaymentDateLabel">Tervezett előbbi kifizetés dátuma</label>
					<input type="date" id="debt-early-payment-date">

					<label for="debt-planned-amount" data-i18n="debtPlannedAmountLabel">Tervezett összeg</label>
					<input type="number" id="debt-planned-amount" min="0" step="0.01" inputmode="decimal">

					<label class="inline-check">
						<input type="checkbox" id="debt-add-to-forecast">
						<span data-i18n="debtAddToForecastLabel">Hozzáadás a költségvetési előrejelzőhöz</span>
					</label>

					<div class="form-actions">
						<button type="submit" id="debt-submit-button" class="btn btn-outline-info" data-i18n="saveDebtButton">Adósság mentése</button>
						<button type="button" id="debt-cancel-button" class="btn btn-outline-info hidden" data-i18n="cancelEditButton">Mégsem</button>
						<button type="button" id="debt-delete-button" class="btn btn-danger hidden" data-i18n="deleteAction">Törlés</button>
					</div>
				</form>
			</article>

			<div class="debt-sidebar">
				<div class="grid budget-stat-pair">
					<article class="card stat">
						<h3 data-i18n="totalDebtTitle">Összes adósság</h3>
						<p id="stat-total-debt">0</p>
					</article>
					<article class="card stat">
						<h3 data-i18n="remainingDebtTitle">Fennmaradó</h3>
						<p id="stat-remaining-debt">0</p>
					</article>
					<article class="card stat">
						<h3 data-i18n="paidDebtTitle">Kifizetett</h3>
						<p id="stat-paid-debt">0</p>
					</article>
					<article class="card stat">
						<h3 data-i18n="totalMonthlyTitle">Havi törlesztők</h3>
						<p id="stat-monthly-total">0</p>
					</article>
				</div>

				<article class="card">
					<h2 data-i18n="debtListTitle">Adósságok listája</h2>
					<ul id="debt-list" class="debt-list"></ul>
				</article>
			</div>

		</div>
	</main>

	<script src="assets/js/app-shared.js?v=3"></script>
	<script type="module" src="assets/js/managing-debt.js?v=3"></script>
</body>
</html>
